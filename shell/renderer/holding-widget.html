<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data: blob:; object-src 'none'; base-uri 'self'; form-action 'none'">
  <title>持仓浮窗</title>
  <link rel="stylesheet" href="holding-widget.css">
</head>
<body>
  <main class="widget-shell" id="widget-shell">
    <div class="drag-region" aria-hidden="true"></div>
    <section class="quote-slot" id="quote-slot" aria-live="polite">
      <div class="quote-empty">暂无持仓股</div>
    </section>
    <div class="window-controls">
      <button type="button" id="minimize-btn" aria-label="最小化浮窗" title="最小化浮窗">-</button>
      <button type="button" id="maximize-btn" aria-label="还原主窗口" title="还原主窗口">□</button>
      <button type="button" id="close-btn" aria-label="关闭浮窗" title="关闭浮窗">×</button>
    </div>
  </main>
  <script src="holding-widget.js"></script>
</body>
</html>
