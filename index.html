<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投资看板</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <h1>投资看板</h1>
                <div class="header-subtitle" id="update-time">数据加载中...</div>
            </div>
            <div class="header-right">
                <button id="refresh-btn" class="header-btn header-refresh-btn" type="button" aria-label="刷新数据">刷新</button>
                <label class="toggle" aria-label="自动刷新">
                    <input type="checkbox" id="auto-refresh-toggle" checked>
                    <span class="toggle-track"></span>
                </label>
                <select id="refresh-interval" aria-label="刷新间隔">
                    <option value="60" selected>1分钟</option>
                    <option value="120">2分钟</option>
                    <option value="300">5分钟</option>
                </select>
            </div>
        </header>

        <nav class="tab-bar" aria-label="看板分类">
            <button class="tab-btn active" type="button" data-tab="market-panel" aria-selected="true">市场</button>
            <button class="tab-btn" type="button" data-tab="flow-panel" aria-selected="false">资金</button>
            <button class="tab-btn" type="button" data-tab="news-panel" aria-selected="false">新闻</button>
        </nav>

        <main id="main-content">
            <div class="tab-panel active" id="market-panel">
                <section class="card index-section">
                    <div class="card-header" role="button" tabindex="0" aria-expanded="true">
                        <h2>大盘指数</h2>
                        <span class="collapse-icon">⌄</span>
                    </div>
                    <div class="card-body">
                        <div class="index-grid">
                            <div class="index-item" data-index="shangzhi">
                                <div class="index-name">上证指数</div>
                                <div class="index-value neutral" id="shangzhi-value">--</div>
                                <div class="index-change" id="shangzhi-change">--</div>
                            </div>
                            <div class="index-item" data-index="shengzheng">
                                <div class="index-name">深证成指</div>
                                <div class="index-value neutral" id="shengzheng-value">--</div>
                                <div class="index-change" id="shengzheng-change">--</div>
                            </div>
                            <div class="index-item" data-index="chuangye">
                                <div class="index-name">创业板指</div>
                                <div class="index-value neutral" id="chuangye-value">--</div>
                                <div class="index-change" id="chuangye-change">--</div>
                            </div>
                            <div class="index-item" data-index="zhuanke50">
                                <div class="index-name">科创50</div>
                                <div class="index-value neutral" id="zhuanke50-value">--</div>
                                <div class="index-change" id="zhuanke50-change">--</div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="card watchlist-section">
                    <div class="card-header" role="button" tabindex="0" aria-expanded="true">
                        <h2>自选股</h2>
                        <span class="collapse-icon">⌄</span>
                    </div>
                    <div class="card-body">
                        <div class="watchlist-add">
                            <input id="watchlist-input" type="text" inputmode="text" placeholder="输入股票代码或名称">
                            <button id="watchlist-add-btn" class="add-btn" type="button">添加</button>
                        </div>
                        <div class="watchlist-status" id="watchlist-status"></div>
                        <div class="watchlist-header-row">
                            <span class="watchlist-header-name">名称</span>
                            <span class="watchlist-header-price">价格</span>
                            <span class="watchlist-header-change">涨跌幅</span>
                            <span class="watchlist-header-action">操作</span>
                        </div>
                        <div class="watchlist-grid" id="watchlist-grid"></div>
                    </div>
                </section>

                <section class="card capital-section">
                    <div class="card-header" role="button" tabindex="0" aria-expanded="true">
                        <h2>资金流向</h2>
                        <span class="collapse-icon">⌄</span>
                    </div>
                    <div class="card-body">
                        <div class="capital-grid">
                            <div class="capital-item">
                                <div class="capital-label">主力资金</div>
                                <div class="capital-value" id="main-capital-value">--</div>
                            </div>
                            <div class="capital-item">
                                <div class="capital-label">北向资金</div>
                                <div class="capital-value" id="north-capital-value">--</div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="tab-panel" id="flow-panel">
                <section class="card sector-section">
                    <div class="card-header" role="button" tabindex="0" aria-expanded="true">
                        <h2>板块排行</h2>
                        <span class="collapse-icon">⌄</span>
                    </div>
                    <div class="card-body">
                        <div class="sector-flow-container">
                            <div class="sector-flow inflow">
                                <h4 class="section-label positive">流入 TOP5</h4>
                                <ul id="inflow-sectors" class="sector-list"></ul>
                            </div>
                            <div class="sector-flow outflow">
                                <h4 class="section-label negative">流出 TOP5</h4>
                                <ul id="outflow-sectors" class="sector-list"></ul>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="card multiday-flow-section" id="multiday-flow-container">
                    <div class="card-header" role="button" tabindex="0" aria-expanded="true">
                        <h2>多日趋势</h2>
                        <span class="collapse-icon">⌄</span>
                    </div>
                    <div class="card-body">
                        <div class="multiday-container">
                            <div class="multiday-table-wrapper">
                                <h4 class="table-title positive">连续流入板块</h4>
                                <table class="multiday-table" id="multiday-inflow"></table>
                            </div>
                            <div class="multiday-table-wrapper">
                                <h4 class="table-title negative">连续流出板块</h4>
                                <table class="multiday-table" id="multiday-outflow"></table>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="tab-panel" id="news-panel">
                <section class="card news-section">
                    <div class="card-header" role="button" tabindex="0" aria-expanded="true">
                        <h2>财经新闻</h2>
                        <span class="collapse-icon">⌄</span>
                    </div>
                    <div class="card-body">
                        <div class="news-list" id="realtime-news"></div>
                    </div>
                </section>
            </div>
        </main>

        <footer class="footer">
            <p>数据仅供参考，不构成投资建议 | 投资有风险，入市需谨慎</p>
            <p>数据来源：东方财富、新浪财经、财联社</p>
        </footer>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
